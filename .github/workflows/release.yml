name: build-portable

# Builds two portable artifacts on every push to master (uploaded as workflow
# artifacts) and, on a v* tag, attaches them to a GitHub Release:
#   - SDCardChecker-<ver>-x86_64.AppImage   portable GTK4 GUI (+ bundled CLI)
#   - sdcheck-<ver>-x86_64.tar.gz           prebuilt system install (CLI, GUI,
#                                            mechanism, polkit, desktop/icon)
#
# Built in an Ubuntu 24.04 container: the GUI uses GTK >= 4.12 APIs (GtkFileDialog,
# gtk_css_provider_load_from_string) and GLib >= 2.74 (G_APPLICATION_DEFAULT_FLAGS),
# which 22.04 is too old for. glibc 2.39 is therefore the floor: the artifacts run
# on 24.04-era and newer distros.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config git ca-certificates wget file \
            libgtk-4-dev libglib2.0-dev libpolkit-gobject-1-dev \
            desktop-file-utils librsvg2-bin librsvg2-common \
            libgdk-pixbuf-2.0-0 gsettings-desktop-schemas patchelf
          # gdk-pixbuf query-loaders tool: package was renamed across releases.
          for p in libgdk-pixbuf-2.0-bin libgdk-pixbuf2.0-bin; do
            apt-get install -y --no-install-recommends "$p" && break || true
          done

      # Pinned to current action majors (Node 24 runtime — no deprecation warnings).
      - name: Checkout
        uses: actions/checkout@v7

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Determine version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0+$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build -j"$(nproc)"
          ./build/sdcheck selftest

      - name: Stage install tree
        run: |
          DESTDIR="$PWD/AppDir"  cmake --install build
          DESTDIR="$PWD/stage"   cmake --install build

      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/build-appimage.sh
          APPDIR="$PWD/AppDir" packaging/appimage/build-appimage.sh "${{ steps.ver.outputs.version }}"

      - name: Build system-integration archive
        run: |
          VER="${{ steps.ver.outputs.version }}"
          OUT="sdcheck-${VER}-x86_64"
          mkdir -p "${OUT}"
          cp -a stage/usr "${OUT}/usr"
          install -m 0755 packaging/system/install.sh   "${OUT}/install.sh"
          install -m 0755 packaging/system/uninstall.sh "${OUT}/uninstall.sh"
          install -m 0644 packaging/system/README.md    "${OUT}/README.md"
          tar czf "${OUT}.tar.gz" "${OUT}"
          ls -lh "${OUT}.tar.gz" *.AppImage

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdcheck-portable-${{ steps.ver.outputs.version }}
          path: |
            *.AppImage
            sdcheck-*-x86_64.tar.gz
          if-no-files-found: error

      - name: Attach to Release (tags only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.AppImage
            sdcheck-*-x86_64.tar.gz
          body_path: packaging/release-notes.md   # explains the assets on the Releases page
          append_body: true                        # then append the auto-generated changelog
          generate_release_notes: true
