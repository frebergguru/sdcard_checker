<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own/run the mechanism. -->
  <policy user="root">
    <allow own="org.sdcheck.Mechanism"/>
    <allow send_destination="org.sdcheck.Mechanism"/>
  </policy>

  <!-- Anyone may call it; polkit performs the real per-operation authorization
       (action org.sdcheck.manage-device) inside the service itself. -->
  <policy context="default">
    <allow send_destination="org.sdcheck.Mechanism"
           send_interface="org.sdcheck.Mechanism1"/>
    <allow send_destination="org.sdcheck.Mechanism"
           send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
